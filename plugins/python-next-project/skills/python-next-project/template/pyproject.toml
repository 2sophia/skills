# Dev-only tooling config. Runtime deps live in requirements.txt; this file is
# excluded from the Docker image (see .dockerignore).

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
